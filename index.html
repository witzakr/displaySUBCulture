<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Your Shoes</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', sans-serif;
            background: #1a1a1a;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .screen {
            display: none;
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: center;
        }

        .screen.active {
            display: flex;
            animation: fadeIn 0.5s ease forwards;
        }

        /* ── Welcome ── */
        .outer {
            background: #222;
            border: 2.5px solid #444;
            border-radius: 28px;
            width: 90%;
            max-width: 700px;
            padding: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .tab {
            position: absolute;
            top: -2.5px;
            left: 50%;
            transform: translateX(-50%);
            background: #f5f5f0;
            border: 2.5px solid #444;
            border-bottom: none;
            border-radius: 0 0 16px 16px;
            padding: 14px 40px;
            font-size: 1rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #111;
            white-space: nowrap;
        }

        .welcome-title {
            font-size: 1.8rem;
            font-weight: 900;
            color: #fff;
            letter-spacing: 1px;
            margin-top: 32px;
            margin-bottom: 24px;
            text-align: center;
        }

        .welcome-desc {
            font-size: 1.1rem;
            font-weight: 700;
            color: #ccc;
            text-align: center;
            line-height: 1.7;
            max-width: 480px;
            margin-bottom: 16px;
        }

        .waiting {
            font-size: 0.85rem;
            font-weight: 700;
            color: #555;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 16px;
        }

        /* ── Subculture screen ── */
        #screen-subculture {
            flex-direction: column;
            gap: 32px;
        }

        .subculture-card {
            background: #222;
            border: 2.5px solid #444;
            border-radius: 28px;
            width: 90%;
            max-width: 700px;
            padding: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .subculture-tab {
            position: absolute;
            top: -2.5px;
            left: 50%;
            transform: translateX(-50%);
            border: 2.5px solid #444;
            border-bottom: none;
            border-radius: 0 0 16px 16px;
            padding: 14px 40px;
            font-size: 1rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #111;
            white-space: nowrap;
            transition: background 0.4s;
        }

        .subculture-name {
            font-size: 2.5rem;
            font-weight: 900;
            color: #fff;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 32px;
            text-align: center;
        }

        /* 3D flip on display */
        .flip-container {
            width: 260px;
            height: 347px;
            perspective: 1000px;
            margin-top: 24px;
        }

        .flipper {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }

        .flipper.flipped { transform: rotateY(180deg); }

        .flip-front,
        .flip-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 16px;
            overflow: hidden;
        }

        .flip-back { transform: rotateY(180deg); }

        .flip-front img,
        .flip-back img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        #status {
            position: fixed;
            bottom: 16px;
            right: 20px;
            font-size: 12px;
            color: #444;
            font-weight: 700;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.97); }
            to   { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <!-- Welcome screen -->
    <div class="screen active" id="screen-welcome">
        <div class="outer">
            <div class="tab">Change Your Shoes</div>
            <h1 class="welcome-title">WELCOME!</h1>
            <p class="welcome-desc">
                Start with an empty desk and use the given subculture as your guide.
                Follow the clues and use the items in the box to bring the space to life.
            </p>
            <p class="waiting">Waiting for selection…</p>
        </div>
    </div>

    <!-- Subculture screen -->
    <div class="screen" id="screen-subculture">
        <div class="subculture-card">
            <div class="subculture-tab" id="subcultureTab">Subculture</div>
            <h2 class="subculture-name" id="subcultureName">—</h2>
            <div class="flip-container">
                <div class="flipper" id="flipper">
                    <div class="flip-front">
                        <img id="cardFront" src="" alt="">
                    </div>
                    <div class="flip-back">
                        <img id="cardBack" src="" alt="">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <span id="status">Connecting…</span>

<script>
    const WS_URL = 'wss://remote-server-production-b3ee.up.railway.app';
    const statusEl = document.getElementById('status');
    let ws;

    const cards = {
        gambler:  { label: 'Gambler',  color: '#d4737a', front: 'cards/GamblerFront.png',  back: 'cards/GamblerBack.png' },
        alt:      { label: 'Alt',      color: '#7a8fb5', front: 'cards/AltFront.png',      back: 'cards/AltBack.png' },
        streamer: { label: 'Streamer', color: '#d4b84a', front: 'cards/StreamerFront.png',  back: 'cards/StreamerBack.png' },
        kpop:     { label: 'K-Pop',    color: '#7ab58a', front: 'cards/KPopFront.png',      back: 'cards/KPopBack.png' },
        queer:    { label: 'Queer',    color: '#a07ab5', front: 'cards/QueerFront.png',     back: 'cards/QueerBack.png' },
        cottage:  { label: 'Cottage',  color: '#d4a07a', front: 'cards/CottageFront.png',   back: 'cards/CottageBack.png' },
    };

    function connect() {
        ws = new WebSocket(WS_URL);

        ws.onopen = () => statusEl.textContent = 'Connected ✓';

        ws.onmessage = (event) => {
            const msg = JSON.parse(event.data);

            if (msg.action === 'select_card') {
                showSubculture(msg.value);
            } else if (msg.action === 'flip_card') {
                document.getElementById('flipper').classList.toggle('flipped', msg.side === 'back');
            } else if (msg.action === 'reset') {
                showScreen('welcome');
            }
        };

        ws.onclose = () => {
            statusEl.textContent = 'Disconnected — retrying…';
            setTimeout(connect, 3000);
        };
    }

    function showSubculture(name) {
        const data = cards[name];
        if (!data) return;

        document.getElementById('subcultureName').textContent = data.label.toUpperCase();
        document.getElementById('subcultureTab').textContent  = data.label;
        document.getElementById('subcultureTab').style.background = data.color;
        document.getElementById('cardFront').src = data.front;
        document.getElementById('cardBack').src  = data.back;
        document.getElementById('flipper').classList.remove('flipped');

        showScreen('subculture');
    }

    function showScreen(name) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(`screen-${name}`).classList.add('active');
    }

    connect();
</script>
</body>
</html>
